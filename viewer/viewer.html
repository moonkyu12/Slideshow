<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슬라이드쇼 - Classroom Slideshow</title>
  <link rel="stylesheet" href="viewer.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="lib/pdf.min.js"></script>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p class="loading-text">슬라이드를 불러오는 중...</p>
      <p class="loading-subtext" id="loading-status">PDF 문서를 로딩하고 있습니다</p>
    </div>
  </div>

  <!-- Error Screen -->
  <div id="error-screen" class="error-screen" style="display:none;">
    <div class="error-content">
      <div class="error-icon">⚠️</div>
      <h2 class="error-title">파일을 불러올 수 없습니다</h2>
      <p class="error-message" id="error-message">알 수 없는 오류가 발생했습니다.</p>
      <button class="error-retry" id="retry-btn">다시 시도</button>
    </div>
  </div>

  <!-- Slideshow Container -->
  <div id="slideshow-container" class="slideshow-container" style="display:none;">
    <!-- Progress Bar -->
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- Slide Canvas -->
    <div class="slide-wrapper" id="slide-wrapper">
      <canvas id="slide-canvas"></canvas>
    </div>

    <!-- Navigation Overlay (left/right click zones) -->
    <div class="nav-overlay">
      <div class="nav-zone nav-prev" id="nav-prev" title="이전 슬라이드">
        <div class="nav-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </div>
      </div>
      <div class="nav-zone nav-next" id="nav-next" title="다음 슬라이드">
        <div class="nav-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
      </div>
    </div>

    <!-- Bottom Control Bar -->
    <div class="control-bar" id="control-bar">
      <div class="control-bar-inner">
        <!-- Slide Counter -->
        <div class="slide-counter">
          <span id="current-page">1</span>
          <span class="counter-divider">/</span>
          <span id="total-pages">1</span>
        </div>

        <!-- Center Controls -->
        <div class="center-controls">
          <button class="ctrl-btn" id="btn-prev" title="이전 (←)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          <button class="ctrl-btn" id="btn-fullscreen" title="전체화면 (F)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
          </button>
          <button class="ctrl-btn" id="btn-next" title="다음 (→)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
        </div>

        <!-- Right Controls -->
        <div class="right-controls">
          <button class="ctrl-btn" id="btn-grid" title="슬라이드 목록 (G)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
            </svg>
          </button>
          <button class="ctrl-btn" id="btn-escape" title="종료 (ESC)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Slide Grid Overlay -->
    <div class="slide-grid-overlay" id="slide-grid-overlay" style="display:none;">
      <div class="grid-header">
        <h3>슬라이드 목록</h3>
        <button class="grid-close" id="grid-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="grid-container" id="grid-container">
        <!-- Thumbnails will be added dynamically -->
      </div>
    </div>
  </div>

  <script src="viewer.js"></script>
</body>
</html>
